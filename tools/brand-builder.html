<!--
    Axe Brand Builder
    Author: David M. Anderson
    Built with AI assistance (Claude, Anthropic)
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Axe Brand Builder</title>
    <style>
        /* --------------------------------------------------------
           Tool chrome — these styles are NOT part of axe.css.
           They style the builder UI itself.
        -------------------------------------------------------- */

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --chrome-bg:      #2a2a2a;
            --chrome-surface: #353535;
            --chrome-panel:   #404040;
            --chrome-border:  #4e4e4e;
            --chrome-text:    #e4e4e4;
            --chrome-muted:   #888888;
            --chrome-accent:  #22c0d8;
            --chrome-radius:  5px;
            --sidebar-width:  280px;
            --output-height:  160px;
        }

        body {
            font-family: system-ui, Arial, Helvetica, sans-serif;
            font-size: 13px;
            background: var(--chrome-bg);
            color: var(--chrome-text);
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 44px 1fr var(--output-height);
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        #header {
            grid-column: 1 / -1;
            background: var(--chrome-surface);
            border-bottom: 1px solid var(--chrome-border);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            gap: 0.75rem;
        }

        #header h1 {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--chrome-text);
            letter-spacing: 0.03em;
        }

        #header h1 span {
            color: var(--chrome-accent);
        }

        #header .sep {
            color: var(--chrome-border);
            font-size: 1.2rem;
            line-height: 1;
        }

        #header .subtitle {
            font-size: 0.75rem;
            color: var(--chrome-muted);
        }

        #header-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        .btn-chrome {
            background: var(--chrome-panel);
            border: 1px solid var(--chrome-border);
            color: var(--chrome-text);
            padding: 0.3rem 0.875rem;
            border-radius: var(--chrome-radius);
            font-size: 0.75rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-chrome:hover {
            border-color: var(--chrome-accent);
            color: var(--chrome-accent);
        }

        .btn-primary {
            background: var(--chrome-accent);
            border-color: var(--chrome-accent);
            color: #0d1117;
            font-weight: 700;
        }

        .btn-primary:hover {
            background: #30d0e6;
            border-color: #30d0e6;
            color: #0d1117;
        }

        /* Sidebar */
        #sidebar {
            background: var(--chrome-surface);
            border-right: 1px solid var(--chrome-border);
            overflow-y: auto;
            padding: 1rem;
            grid-row: 2 / 3;
        }

        .ctrl-section {
            margin-bottom: 1.5rem;
        }

        .ctrl-section:last-child { margin-bottom: 0; }

        .ctrl-section h2 {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--chrome-muted);
            margin-bottom: 0.75rem;
            padding-bottom: 0.375rem;
            border-bottom: 1px solid var(--chrome-border);
        }

        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.625rem;
        }

        .ctrl-row:last-child { margin-bottom: 0; }

        .ctrl-label {
            font-size: 0.75rem;
            color: var(--chrome-muted);
            width: 64px;
            flex-shrink: 0;
        }

        input[type="color"] {
            width: 30px;
            height: 26px;
            border: 1px solid var(--chrome-border);
            border-radius: var(--chrome-radius);
            background: none;
            cursor: pointer;
            padding: 1px 2px;
            flex-shrink: 0;
        }

        input[type="text"],
        select {
            flex: 1;
            min-width: 0;
            background: var(--chrome-panel);
            border: 1px solid var(--chrome-border);
            color: var(--chrome-text);
            padding: 0.3rem 0.5rem;
            border-radius: var(--chrome-radius);
            font-size: 0.75rem;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--chrome-accent);
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--chrome-accent);
            cursor: pointer;
        }

        .range-readout {
            font-size: 0.75rem;
            color: var(--chrome-muted);
            width: 30px;
            text-align: right;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .radio-group {
            display: flex;
            gap: 0.375rem;
            flex: 1;
        }

        .radio-opt {
            flex: 1;
            text-align: center;
            padding: 0.3rem 0;
            border: 1px solid var(--chrome-border);
            border-radius: var(--chrome-radius);
            cursor: pointer;
            font-size: 0.72rem;
            color: var(--chrome-muted);
            background: var(--chrome-panel);
            transition: all 0.12s;
            user-select: none;
        }

        .radio-opt:hover { color: var(--chrome-text); border-color: #3a4555; }

        .radio-opt.active {
            border-color: var(--chrome-accent);
            color: var(--chrome-accent);
            background: rgba(34, 192, 216, 0.08);
        }

        .custom-font-fields {
            display: none;
        }

        .custom-font-fields.visible {
            display: contents;
        }

        /* Copy toast */
        #toast {
            position: fixed;
            bottom: calc(var(--output-height) + 12px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--chrome-accent);
            color: #0d1117;
            padding: 0.4rem 0.875rem;
            border-radius: var(--chrome-radius);
            font-size: 0.75rem;
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 100;
        }

        #toast.visible { opacity: 1; }

        /* Preview area */
        #preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            background: var(--chrome-bg);
            gap: 1px;
        }

        .preview-wrap {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--chrome-muted);
            padding: 0.4rem 0.875rem;
            background: var(--chrome-surface);
            border-bottom: 1px solid var(--chrome-border);
            flex-shrink: 0;
        }

        .pane {
            flex: 1;
            overflow-y: auto;
            /* CSS variables set dynamically by JS */
        }

        /* --------------------------------------------------------
           Preview pane internal styles — scoped to .pane
           Mirrors what axe.css produces on real pages.
        -------------------------------------------------------- */

        .pane {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            line-height: 1.7;
            font-size: 14px;
        }

        /* Palette strip — shows generated tints/shades in context */
        .pv-palette {
            padding: 0.6rem 1rem 0.75rem;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .pv-palette-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: 0.25rem;
        }

        .pv-palette-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.2rem;
            margin-bottom: 0.3rem;
        }

        .pv-palette-row:last-child { margin-bottom: 0; }

        .pv-swatch {
            aspect-ratio: 3 / 1;
            border-radius: 2px;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.08);
            transition: transform 0.1s;
        }

        .pv-swatch:hover { transform: scale(1.05); }

        .pv-swatch.core {
            border: 2px solid var(--color-text);
        }

        .pv-nav {
            background: var(--color-nav-bg);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            height: 48px;
            gap: 0.125rem;
        }

        .pv-nav-brand {
            color: var(--color-nav-text);
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            margin-right: 0.5rem;
            opacity: 1;
        }

        .pv-nav a {
            color: var(--color-nav-text);
            text-decoration: none;
            padding: 0.35rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.8rem;
            opacity: 0.82;
        }

        .pv-main {
            max-width: 560px;
            margin: 0 auto;
            padding: 1.75rem 1.25rem;
            background: var(--color-surface);
            box-shadow: var(--shadow);
        }

        .pv-main h1 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            line-height: 1.2;
            margin-bottom: 0.3rem;
        }

        .pv-main h2 {
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 400;
            color: var(--color-text-muted);
            margin-bottom: 1.1rem;
        }

        .pv-main p {
            font-size: 0.875rem;
            color: var(--color-text);
            margin-bottom: 0.875rem;
            line-height: 1.65;
        }

        .pv-main p mark {
            background: var(--color-highlight);
            color: var(--color-text);
            padding: 0.05rem 0.25rem;
            border-radius: 2px;
        }

        .pv-main a {
            color: var(--color-accent);
            text-decoration: none;
        }

        .pv-btn {
            display: inline-block;
            background: var(--color-accent);
            color: #fff;
            padding: 0.45rem 1.1rem;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: var(--font-body);
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow);
            text-decoration: none;
            margin-bottom: 1.1rem;
        }

        .pv-aside {
            margin: 1.1rem 0;
            padding: 0.75rem 1rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-left: 4px solid var(--color-accent);
            border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            line-height: 1.55;
            box-shadow: var(--shadow);
        }

        .pv-card {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-top: 1rem;
            box-shadow: var(--shadow-md);
        }

        .pv-card-title {
            font-family: var(--font-heading);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 0.3rem;
        }

        .pv-card-body {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            line-height: 1.5;
            margin: 0;
        }

        .pv-footer {
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            text-align: center;
            padding: 0.875rem;
            font-size: 0.75rem;
            color: var(--color-text-muted);
        }

        /* Output */
        #output {
            grid-column: 1 / -1;
            background: var(--chrome-surface);
            border-top: 1px solid var(--chrome-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #output-header {
            display: flex;
            align-items: center;
            padding: 0.375rem 1rem;
            border-bottom: 1px solid var(--chrome-border);
            gap: 0.625rem;
            flex-shrink: 0;
        }

        #output-header .filename {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--chrome-muted);
        }

        #css-output {
            flex: 1;
            overflow-y: auto;
            padding: 0.625rem 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #8ab8d8;
            white-space: pre;
            line-height: 1.55;
        }
    </style>
</head>
<body>

    <header id="header">
        <h1><span>Axe</span> Brand Builder</h1>
        <span class="sep">/</span>
        <span class="subtitle">Generates brand.css</span>
        <div id="header-actions">
            <button class="btn-chrome" id="copy-btn">Copy CSS</button>
            <button class="btn-chrome btn-primary" id="download-btn">Download brand.css</button>
        </div>
    </header>

    <aside id="sidebar">

        <div class="ctrl-section">
            <h2>Colors</h2>
            <div class="ctrl-row">
                <span class="ctrl-label">Primary</span>
                <input type="color" id="color-primary" value="#0d2d5b">
                <input type="text"  id="hex-primary"   value="#0d2d5b" maxlength="7">
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">Secondary</span>
                <input type="color" id="color-secondary" value="#00ADEE">
                <input type="text"  id="hex-secondary"   value="#00ADEE" maxlength="7">
            </div>
        </div>

        <div class="ctrl-section">
            <h2>Typography</h2>
            <div class="ctrl-row">
                <span class="ctrl-label">Body</span>
                <select id="font-body">
                    <option value="system-ui, Arial, Helvetica, sans-serif">System UI</option>
                    <option value="Verdana, Arial, Helvetica, sans-serif">Verdana</option>
                    <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                    <option value="'Trebuchet MS', Arial, Helvetica, sans-serif">Trebuchet MS</option>
                    <option value="'Gill Sans', Arial, Helvetica, sans-serif">Gill Sans</option>
                    <option value="Arial, Helvetica, sans-serif">Arial</option>
                    <option value="custom">Custom (Google Fonts)…</option>
                </select>
            </div>
            <div class="custom-font-fields" id="body-custom">
                <div class="ctrl-row">
                    <span class="ctrl-label">Import URL</span>
                    <input type="text" id="font-body-url" placeholder="https://fonts.googleapis.com/…">
                </div>
                <div class="ctrl-row">
                    <span class="ctrl-label">Font name</span>
                    <input type="text" id="font-body-name" placeholder="e.g. Outfit, sans-serif">
                </div>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">Heading</span>
                <select id="font-heading">
                    <option value="same">Same as body</option>
                    <option value="system-ui, Arial, Helvetica, sans-serif">System UI</option>
                    <option value="Verdana, Arial, Helvetica, sans-serif">Verdana</option>
                    <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                    <option value="'Trebuchet MS', Arial, Helvetica, sans-serif">Trebuchet MS</option>
                    <option value="'Gill Sans', Arial, Helvetica, sans-serif">Gill Sans</option>
                    <option value="Arial, Helvetica, sans-serif">Arial</option>
                    <option value="custom">Custom (Google Fonts)…</option>
                </select>
            </div>
            <div class="custom-font-fields" id="heading-custom">
                <div class="ctrl-row">
                    <span class="ctrl-label">Import URL</span>
                    <input type="text" id="font-heading-url" placeholder="https://fonts.googleapis.com/…">
                </div>
                <div class="ctrl-row">
                    <span class="ctrl-label">Font name</span>
                    <input type="text" id="font-heading-name" placeholder="e.g. Fraunces, serif">
                </div>
            </div>
        </div>

        <div class="ctrl-section">
            <h2>Border Radius</h2>
            <div class="ctrl-row">
                <span class="ctrl-label">Radius</span>
                <input type="range" id="radius-input" min="0" max="20" value="5">
                <span class="range-readout" id="radius-readout">5px</span>
            </div>
        </div>

        <div class="ctrl-section">
            <h2>Shadows</h2>
            <div class="ctrl-row">
                <span class="ctrl-label">Style</span>
                <div class="radio-group" id="shadow-group">
                    <div class="radio-opt" data-value="none">None</div>
                    <div class="radio-opt active" data-value="subtle">Subtle</div>
                    <div class="radio-opt" data-value="elevated">Elevated</div>
                </div>
            </div>
        </div>

    </aside>

    <div id="preview">
        <div class="preview-wrap">
            <div class="preview-label">Light Mode</div>
            <div class="pane" id="pane-light"></div>
        </div>
        <div class="preview-wrap">
            <div class="preview-label">Dark Mode</div>
            <div class="pane" id="pane-dark"></div>
        </div>
    </div>

    <div id="output">
        <div id="output-header">
            <span class="filename">brand.css</span>
            <button class="btn-chrome" id="copy-btn-2">Copy</button>
        </div>
        <pre id="css-output"></pre>
    </div>

    <div id="toast">Copied</div>

    <script>
    // ========================================================
    // Color utilities
    // ========================================================

    function hexToRgb(hex) {
        const h = hex.replace('#', '');
        return [
            parseInt(h.slice(0, 2), 16),
            parseInt(h.slice(2, 4), 16),
            parseInt(h.slice(4, 6), 16)
        ];
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        const l = (max + min) / 2;
        let h = 0, s = 0;
        if (max !== min) {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                case g: h = ((b - r) / d + 2) / 6; break;
                case b: h = ((r - g) / d + 4) / 6; break;
            }
        }
        return [h * 360, s * 100, l * 100];
    }

    function hslToHex(h, s, l) {
        h = ((h % 360) + 360) % 360;
        s = Math.max(0, Math.min(100, s)) / 100;
        l = Math.max(0, Math.min(100, l)) / 100;
        const a = s * Math.min(l, 1 - l);
        const f = n => {
            const k = (n + h / 30) % 12;
            return Math.round(255 * (l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1)))
                .toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`;
    }

    function hexToHsl(hex) {
        const [r, g, b] = hexToRgb(hex);
        return rgbToHsl(r, g, b);
    }

    function isValidHex(s) {
        return /^#[0-9a-fA-F]{6}$/.test(s);
    }

    // ========================================================
    // Tint and shade generation (RGB mixing with white / black)
    //   tint(k):  mix toward white  — higher k = lighter
    //   shade(k): mix toward black  — higher k = darker
    // RGB mix (not HSL) gives proper tints that desaturate as
    // they lighten, matching traditional design expectations
    // and producing better UI-functional neutrals.
    // ========================================================

    const TINT_STOPS  = [0.3, 0.6, 0.85];   // tint-1, tint-2, tint-3
    const SHADE_STOPS = [0.3, 0.6, 0.85];   // shade-1, shade-2, shade-3

    function mix(hex, targetR, targetG, targetB, k) {
        const [r, g, b] = hexToRgb(hex);
        const nr = Math.round(r + (targetR - r) * k);
        const ng = Math.round(g + (targetG - g) * k);
        const nb = Math.round(b + (targetB - b) * k);
        return '#' + [nr, ng, nb].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function tintHex(hex, k)  { return mix(hex, 255, 255, 255, k); }
    function shadeHex(hex, k) { return mix(hex,   0,   0,   0, k); }

    function ramp(hex) {
        return {
            raw:    hex,
            tints:  TINT_STOPS.map(k => tintHex(hex, k)),
            shades: SHADE_STOPS.map(k => shadeHex(hex, k)),
        };
    }

    // ========================================================
    // Palette generation
    //   Takes primary + secondary, produces:
    //     - Extended palette (primary ramp, secondary ramp)
    //     - Required Axe contract vars (light + dark)
    // Primary hue tints the neutrals for cohesion.
    // Nav bg derives automatically from primary.
    // ========================================================

    function generatePalette(primaryHex, secondaryHex) {
        const primary   = ramp(primaryHex);
        const secondary = ramp(secondaryHex);

        const [ph, ps] = hexToHsl(primaryHex);
        const bgSat = Math.min(ps * 0.1, 10);

        // Nav derivation
        const navBgLight = shadeHex(primaryHex, 0.5);   // dark navy
        const [nbh, nbs, nbl] = hexToHsl(navBgLight);
        const navTextLight = nbl < 55 ? hslToHex(0, 0, 95) : hslToHex(ph, bgSat, 15);

        const navBgDark = shadeHex(primaryHex, 0.85);   // nearly black
        const navTextDark = hslToHex(0, 0, 92);

        const extended = {
            '--primary':          primary.raw,
            '--primary-tint-1':   primary.tints[0],
            '--primary-tint-2':   primary.tints[1],
            '--primary-tint-3':   primary.tints[2],
            '--primary-shade-1':  primary.shades[0],
            '--primary-shade-2':  primary.shades[1],
            '--primary-shade-3':  primary.shades[2],
            '--secondary':        secondary.raw,
            '--secondary-tint-1': secondary.tints[0],
            '--secondary-tint-2': secondary.tints[1],
            '--secondary-tint-3': secondary.tints[2],
            '--secondary-shade-1':secondary.shades[0],
            '--secondary-shade-2':secondary.shades[1],
            '--secondary-shade-3':secondary.shades[2],
        };

        const light = {
            '--color-bg':            hslToHex(ph, bgSat, 97),
            '--color-surface':       '#ffffff',
            '--color-text':          hslToHex(ph, Math.min(ps * 0.18, 16), 12),
            '--color-text-muted':    hslToHex(ph, Math.min(ps * 0.12, 12), 42),
            '--color-border':        hslToHex(ph, bgSat, 88),
            '--color-accent':        primary.raw,
            '--color-accent-hover':  primary.shades[0],
            '--color-highlight':     secondary.raw,
            '--color-highlight-hover': secondary.shades[0],
            '--color-nav-bg':        navBgLight,
            '--color-nav-text':      navTextLight,
        };

        const dark = {
            '--color-bg':            hslToHex(ph, Math.min(ps * 0.2, 15), 8),
            '--color-surface':       hslToHex(ph, Math.min(ps * 0.16, 13), 13),
            '--color-text':          hslToHex(ph, Math.min(ps * 0.06, 6), 92),
            '--color-text-muted':    hslToHex(ph, Math.min(ps * 0.08, 8), 60),
            '--color-border':        hslToHex(ph, Math.min(ps * 0.2, 15), 22),
            '--color-accent':        primary.tints[0],
            '--color-accent-hover':  primary.tints[1],
            '--color-highlight':     secondary.tints[0],
            '--color-highlight-hover': secondary.tints[1],
            '--color-nav-bg':        navBgDark,
            '--color-nav-text':      navTextDark,
        };

        return { primary, secondary, extended, light, dark };
    }

    // ========================================================
    // Shadows
    // ========================================================

    const SHADOWS = {
        none:     { sm: 'none',                           md: 'none' },
        subtle:   { sm: '0 1px 3px rgba(0,0,0,0.09)',    md: '0 4px 12px rgba(0,0,0,0.11)' },
        elevated: { sm: '0 2px 8px rgba(0,0,0,0.16)',    md: '0 8px 24px rgba(0,0,0,0.2)' },
    };

    const SHADOWS_DARK = {
        none:     { sm: 'none',                           md: 'none' },
        subtle:   { sm: '0 1px 3px rgba(0,0,0,0.4)',     md: '0 4px 12px rgba(0,0,0,0.5)' },
        elevated: { sm: '0 2px 8px rgba(0,0,0,0.55)',    md: '0 8px 24px rgba(0,0,0,0.65)' },
    };

    // ========================================================
    // State
    // ========================================================

    const state = {
        primary:          '#0d2d5b',
        secondary:        '#00ADEE',
        fontBody:         'system-ui, Arial, Helvetica, sans-serif',
        fontBodyUrl:      '',
        fontBodyName:     '',
        fontHeading:      'same',
        fontHeadingUrl:   '',
        fontHeadingName:  '',
        radius:           5,
        shadow:           'subtle',
    };

    // ========================================================
    // Resolve effective font values
    // ========================================================

    function getFonts() {
        const body = state.fontBody === 'custom'
            ? (state.fontBodyName || 'system-ui, Arial, Helvetica, sans-serif')
            : state.fontBody;

        const heading = state.fontHeading === 'same'
            ? body
            : state.fontHeading === 'custom'
                ? (state.fontHeadingName || body)
                : state.fontHeading;

        return { body, heading };
    }

    // ========================================================
    // Preview HTML template
    // ========================================================

    function paletteStripHTML(palette) {
        const swatch = (hex, label, isCore) =>
            `<div class="pv-swatch${isCore ? ' core' : ''}" style="background:${hex}" title="${label} · ${hex}" data-hex="${hex}"></div>`;

        const primaryRow = [
            swatch(palette.primary.tints[2], 'primary-tint-3'),
            swatch(palette.primary.tints[1], 'primary-tint-2'),
            swatch(palette.primary.tints[0], 'primary-tint-1'),
            swatch(palette.primary.raw,      'primary', true),
            swatch(palette.primary.shades[0], 'primary-shade-1'),
            swatch(palette.primary.shades[1], 'primary-shade-2'),
            swatch(palette.primary.shades[2], 'primary-shade-3'),
        ].join('');

        const secondaryRow = [
            swatch(palette.secondary.tints[2], 'secondary-tint-3'),
            swatch(palette.secondary.tints[1], 'secondary-tint-2'),
            swatch(palette.secondary.tints[0], 'secondary-tint-1'),
            swatch(palette.secondary.raw,      'secondary', true),
            swatch(palette.secondary.shades[0], 'secondary-shade-1'),
            swatch(palette.secondary.shades[1], 'secondary-shade-2'),
            swatch(palette.secondary.shades[2], 'secondary-shade-3'),
        ].join('');

        return `
<div class="pv-palette">
    <div class="pv-palette-label">Extended palette · click to copy</div>
    <div class="pv-palette-row">${primaryRow}</div>
    <div class="pv-palette-row">${secondaryRow}</div>
</div>`;
    }

    function previewBodyHTML() {
        return `
<nav class="pv-nav">
    <a class="pv-nav-brand" href="#">Your Brand</a>
    <a href="#">Services</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>
<div class="pv-main">
    <h1>Write plain HTML. It looks good.</h1>
    <h2>Preview your brand colors, fonts, and shapes in context.</h2>
    <p>Body copy reads cleanly. Here is <a href="#">a link</a> and <mark>a highlighted phrase</mark> in context. Line height and spacing feel balanced across devices.</p>
    <a class="pv-btn" href="#">Get in touch</a>
    <aside class="pv-aside">
        Callout block using the accent color on the left border and a subtle elevation.
    </aside>
    <div class="pv-card">
        <div class="pv-card-title">Surface card</div>
        <p class="pv-card-body">A content card using the bg surface color. Demonstrates border, shadow, and radius settings together in context.</p>
    </div>
</div>
<footer class="pv-footer">&copy; 2026 Acme &nbsp;&middot;&nbsp; contact@example.com</footer>`;
    }

    // ========================================================
    // Apply variables to a pane element
    // ========================================================

    function applyPane(pane, palette, mode, fonts, radius, shadowKey) {
        const contract = palette[mode];
        const shad = mode === 'dark' ? SHADOWS_DARK : SHADOWS;

        Object.entries(contract).forEach(([k, v]) => pane.style.setProperty(k, v));
        Object.entries(palette.extended).forEach(([k, v]) => pane.style.setProperty(k, v));
        pane.style.setProperty('--font-body',    fonts.body);
        pane.style.setProperty('--font-heading', fonts.heading);
        pane.style.setProperty('--radius',       radius + 'px');
        pane.style.setProperty('--shadow',       shad[shadowKey].sm);
        pane.style.setProperty('--shadow-md',    shad[shadowKey].md);
    }

    // ========================================================
    // Generate brand.css output
    //   Structure:
    //     :root — extended palette (theme-independent)
    //           + required contract (light mode)
    //           + typography + radius + shadow (light)
    //     @media (prefers-color-scheme: dark) :root:not([data-theme="light"]) — dark overrides
    //     [data-theme="dark"]  — manual dark override
    //     [data-theme="light"] — manual light override (restores light)
    // ========================================================

    function fmtVars(vars, indent) {
        const pad = ' '.repeat(indent);
        return Object.entries(vars).map(([k, v]) => `${pad}${k}: ${v};`).join('\n');
    }

    function generateCSS(palette, fonts, radius, shadowKey) {
        const imports = [];
        if (state.fontBody === 'custom' && state.fontBodyUrl)
            imports.push(`@import url('${state.fontBodyUrl}');`);
        if (state.fontHeading === 'custom' && state.fontHeadingUrl
                && state.fontHeadingUrl !== state.fontBodyUrl)
            imports.push(`@import url('${state.fontHeadingUrl}');`);

        const lShad = SHADOWS[shadowKey];
        const dShad = SHADOWS_DARK[shadowKey];

        const headingVal = fonts.heading === fonts.body
            ? 'var(--font-body)'
            : fonts.heading;

        const importBlock = imports.length ? imports.join('\n') + '\n\n' : '';

        return `${importBlock}/*
 * Generated by Axe Brand Builder
 * Primary: ${state.primary}  Secondary: ${state.secondary}
 */

:root {
    /* ---- Extended palette (theme-independent) ---------------- */
${fmtVars(palette.extended, 4)}

    /* ---- Required contract — Light mode ---------------------- */
${fmtVars(palette.light, 4)}

    /* ---- Typography ------------------------------------------ */
    --font-body:    ${fonts.body};
    --font-heading: ${headingVal};
    --font-mono:    'Courier New', Courier, monospace;
    --line-height:  1.7;

    /* ---- Shape ----------------------------------------------- */
    --radius: ${radius}px;

    /* ---- Shadow ---------------------------------------------- */
    --shadow:    ${lShad.sm};
    --shadow-md: ${lShad.md};
}

/* Dark mode — system preference */
@media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
${fmtVars(palette.dark, 8)}
        --shadow:    ${dShad.sm};
        --shadow-md: ${dShad.md};
    }
}

/* Dark mode — manual override */
[data-theme="dark"] {
${fmtVars(palette.dark, 4)}
    --shadow:    ${dShad.sm};
    --shadow-md: ${dShad.md};
}

/* Light mode — manual override */
[data-theme="light"] {
${fmtVars(palette.light, 4)}
    --shadow:    ${lShad.sm};
    --shadow-md: ${lShad.md};
}`;
    }

    // ========================================================
    // Main update cycle
    // ========================================================

    let currentPalette = null;

    function update() {
        if (!isValidHex(state.primary) || !isValidHex(state.secondary)) return;

        currentPalette = generatePalette(state.primary, state.secondary);
        const fonts = getFonts();

        const light = document.getElementById('pane-light');
        const dark  = document.getElementById('pane-dark');

        const paletteHTML = paletteStripHTML(currentPalette);
        light.innerHTML = paletteHTML + previewBodyHTML();
        dark.innerHTML  = paletteHTML + previewBodyHTML();

        applyPane(light, currentPalette, 'light', fonts, state.radius, state.shadow);
        applyPane(dark,  currentPalette, 'dark',  fonts, state.radius, state.shadow);

        document.getElementById('css-output').textContent =
            generateCSS(currentPalette, fonts, state.radius, state.shadow);
    }

    // ========================================================
    // Wire up color controls
    // ========================================================

    function syncColor(pickerId, hexId, stateKey) {
        const picker = document.getElementById(pickerId);
        const hexIn  = document.getElementById(hexId);

        picker.addEventListener('input', e => {
            state[stateKey] = e.target.value;
            hexIn.value = e.target.value;
            update();
        });

        hexIn.addEventListener('input', e => {
            let v = e.target.value.trim();
            if (!v.startsWith('#')) v = '#' + v;
            if (isValidHex(v)) {
                state[stateKey] = v;
                picker.value = v;
                update();
            }
        });
    }

    syncColor('color-primary',   'hex-primary',   'primary');
    syncColor('color-secondary', 'hex-secondary', 'secondary');

    // ========================================================
    // Font controls
    // ========================================================

    document.getElementById('font-body').addEventListener('change', e => {
        state.fontBody = e.target.value;
        document.getElementById('body-custom').classList.toggle('visible', e.target.value === 'custom');
        update();
    });

    document.getElementById('font-body-url').addEventListener('input', e => {
        state.fontBodyUrl = e.target.value;
        update();
    });

    document.getElementById('font-body-name').addEventListener('input', e => {
        state.fontBodyName = e.target.value;
        update();
    });

    document.getElementById('font-heading').addEventListener('change', e => {
        state.fontHeading = e.target.value;
        document.getElementById('heading-custom').classList.toggle('visible', e.target.value === 'custom');
        update();
    });

    document.getElementById('font-heading-url').addEventListener('input', e => {
        state.fontHeadingUrl = e.target.value;
        update();
    });

    document.getElementById('font-heading-name').addEventListener('input', e => {
        state.fontHeadingName = e.target.value;
        update();
    });

    // ========================================================
    // Radius
    // ========================================================

    document.getElementById('radius-input').addEventListener('input', e => {
        state.radius = parseInt(e.target.value);
        document.getElementById('radius-readout').textContent = state.radius + 'px';
        update();
    });

    // ========================================================
    // Shadow
    // ========================================================

    document.querySelectorAll('#shadow-group .radio-opt').forEach(el => {
        el.addEventListener('click', () => {
            document.querySelectorAll('#shadow-group .radio-opt')
                .forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            state.shadow = el.dataset.value;
            update();
        });
    });

    // ========================================================
    // Copy helpers
    // ========================================================

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('visible');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('visible'), 1400);
    }

    function copyCSS(btnId) {
        const css = document.getElementById('css-output').textContent;
        navigator.clipboard.writeText(css).then(() => {
            const btn = document.getElementById(btnId);
            const orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = orig, 1600);
        });
    }

    document.getElementById('copy-btn').addEventListener('click',   () => copyCSS('copy-btn'));
    document.getElementById('copy-btn-2').addEventListener('click', () => copyCSS('copy-btn-2'));

    // Click-to-copy on palette swatches (event delegation)
    document.getElementById('preview').addEventListener('click', e => {
        const sw = e.target.closest('.pv-swatch');
        if (!sw) return;
        const hex = sw.dataset.hex;
        navigator.clipboard.writeText(hex).then(() => showToast('Copied ' + hex));
    });

    document.getElementById('download-btn').addEventListener('click', () => {
        const css  = document.getElementById('css-output').textContent;
        const blob = new Blob([css], { type: 'text/css' });
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = 'brand.css';
        a.click();
        URL.revokeObjectURL(a.href);
    });

    // ========================================================
    // Initial render
    // ========================================================

    update();
    </script>
</body>
</html>
