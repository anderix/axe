<!--
    Axe Viewer
    Author: David M. Anderson
    Built with AI assistance (Claude, Anthropic)
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Defense-in-depth. The viewer uses inline scripts, so script-src keeps
         'unsafe-inline'; the value here is locking base-uri and object-src and
         confining connect-src to same-origin (external feeds, when allowlisted,
         must also be added to connect-src). A stronger header-based CSP with a
         nonce and frame-ancestors is recommended at deploy time — see SECURITY.md. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'">
    <title>View</title>
    <link rel="stylesheet" href="../default.css">
    <link rel="stylesheet" href="../../brand.css"><!-- site brand (sibling of axe/); overrides default, 404s harmlessly when absent -->
    <link rel="stylesheet" href="../axe.css">
    <link rel="stylesheet" href="../calendar.css">
    <script src="../dependencies/marked.min.js"></script>
    <script src="../dependencies/purify.min.js"></script>
    <script src="../calendar.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.5rem;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            font-size: 0.85rem;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
        }

        .toolbar .title {
            font-weight: 600;
            color: var(--color-text);
            margin-right: auto;
        }

        .toolbar .title a {
            color: var(--color-accent);
            text-decoration: none;
        }

        .toolbar .title a:hover { text-decoration: underline; }

        .toolbar .title .sep {
            color: var(--color-text-muted);
            opacity: 0.5;
            margin: 0 0.25rem;
        }

        .toolbar select, .toolbar button, .toolbar input {
            font-size: 0.8rem;
            padding: 0.3rem 0.5rem;
            width: auto;
        }

        .toolbar label {
            display: inline;
            font-weight: normal;
            font-size: 0.8rem;
            margin: 0;
            color: var(--color-text-muted);
        }

        .toolbar .info {
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        .toolbar .separator {
            width: 1px;
            height: 1.25rem;
            background: var(--color-border);
        }

        /* .theme-toggle styling comes from axe.css (framework). */

        /* Content area - override axe constraints.
           width:100% is required, not just max-width: in the flex-column body,
           main's inherited `margin: 0 auto` otherwise shrinks it to content
           width and centers it (auto cross-axis margins disable the stretch). */
        body > main {
            flex: 1;
            padding: 0;
            max-width: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* --- CSV view --- */
        .csv-wrap {
            flex: 1;
            overflow: auto;
            /* GNOME/GTK overlay scrollbars auto-hide, so a wide table gives no
               cue that it scrolls. Opt into a thin, always-visible on-brand bar
               here — setting scrollbar-color is what takes Firefox out of
               overlay mode. The ::-webkit- rules below do the same for Chromium
               and Safari. */
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .csv-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
        .csv-wrap::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 5px;
        }
        .csv-wrap::-webkit-scrollbar-track { background: transparent; }

        /* Auto layout sizes each column to its content (capped per cell below)
           rather than cramming every column into the viewport; min-width:100%
           still fills the width when a narrow file leaves slack, and the table
           overflows .csv-wrap into a horizontal scrollbar when it's wide. */
        .csv-table {
            font-size: 0.85rem;
            border-collapse: collapse;
            table-layout: auto;
            min-width: 100%;
        }

        .csv-table th {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--color-surface);
            border-bottom: 2px solid var(--color-border);
            padding: 0.5rem 0.75rem;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .csv-table th:hover { color: var(--color-accent); }

        .csv-table th .sort-arrow {
            font-size: 0.65em;
            margin-left: 0.3rem;
            opacity: 0.4;
        }

        .csv-table th .sort-arrow.active {
            opacity: 1;
            color: var(--color-accent);
        }

        .csv-table td {
            padding: 0.35rem 0.75rem;
            border-bottom: 1px solid var(--color-border);
            white-space: nowrap;
            min-width: 5rem;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .csv-table tbody tr:hover {
            background: color-mix(in srgb, var(--color-accent) 8%, transparent);
        }

        .csv-table .filter-row th {
            padding: 0.25rem 0.5rem;
            border-bottom: 2px solid var(--color-border);
        }

        .csv-table .filter-row input {
            font-size: 0.78rem;
            padding: 0.2rem 0.4rem;
            width: 100%;
            min-width: 60px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            color: var(--color-text);
            border-radius: calc(var(--radius) * 0.6);
        }

        .csv-table .filter-row input:focus {
            border-color: var(--color-accent);
            outline: none;
        }

        .group-header td {
            background: var(--color-surface);
            font-weight: 600;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--color-border);
        }

        .group-header td:hover { color: var(--color-accent); }

        .group-header .toggle {
            font-size: 0.65em;
            margin-right: 0.5rem;
            display: inline-block;
            transition: transform 0.15s;
        }

        .group-header.collapsed .toggle { transform: rotate(-90deg); }

        .group-hidden { display: none; }

        /* Freeze the row-number column during horizontal scroll, mirroring the
           sticky header's vertical freeze. Stacking: body cells (auto) < this
           frozen column (6) < the sticky header row (10) < the header's own
           number cells, which are the top-left corner and freeze on both axes
           (12, set under thead below). The opaque background keeps the columns
           it scrolls past from showing through. */
        .csv-table .row-num {
            position: sticky;
            left: 0;
            z-index: 6;
            background: var(--color-bg);
            color: var(--color-text-muted);
            text-align: right;
            font-size: 0.75rem;
            padding-right: 0.5rem;
            width: var(--row-num-width, 2.5rem);
            min-width: 0;
            white-space: nowrap;
            border-right: 1px solid var(--color-border);
        }

        /* The header's number cells (the "#" and the empty filter cell) are the
           top-left corner: frozen on both axes, so they ride above the sticky
           header row and the frozen column alike, and take the header surface. */
        .csv-table thead .row-num {
            z-index: 12;
            background: var(--color-surface);
        }

        /* Keep the row-hover band continuous across the frozen cell — its opaque
           background would otherwise punch a gap in the highlight. */
        .csv-table tbody tr:hover .row-num {
            background: color-mix(in srgb, var(--color-accent) 8%, var(--color-bg));
        }

        /* --- Markdown view --- */
        .md-view {
            max-width: 860px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        /* --- Slides view: native one-at-a-time presenter ---
           The stage is the largest 16:9 box that fits the viewport, and its
           type scales with `cqw` (container-query width) units, so the deck
           resizes with pure CSS — no JS measurement and no resize handler. JS
           only drives which slide is active and the navigation. */
        .deck {
            position: fixed;
            inset: 0;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .stage {
            position: relative;
            width: min(100vw, 177.78vh);  /* 16:9: clamp by width or height */
            aspect-ratio: 16 / 9;
            background: var(--color-surface);
            box-shadow: var(--shadow-md);
            container-type: size;
            overflow: hidden;
        }
        .slide {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            padding: 6cqh 7cqw;
            box-sizing: border-box;
            font-size: 2.7cqw;       /* everything below sizes in em off this */
            line-height: 1.4;
            color: var(--color-text);
            overflow: auto;
        }
        .slide.active { display: flex; }
        .slide > :first-child { margin-top: 0; }
        .slide > :last-child { margin-bottom: 0; }
        .slide h1 { font-size: 2.3em; margin: 0 0 0.4em; }
        .slide h2 { font-size: 1.7em; margin: 0 0 0.4em; color: var(--color-accent); }
        .slide h3 { font-size: 1.25em; margin: 0 0 0.4em; }
        .slide h1, .slide h2 {
            border-bottom: 0.12em solid var(--color-accent);
            padding-bottom: 0.15em;
            display: inline-block;
            align-self: flex-start;
        }
        .slide p { margin: 0.5em 0; }
        .slide ul, .slide ol { margin: 0.5em 0; padding-left: 1.4em; }
        .slide li { margin: 0.25em 0; }
        .slide code {
            font-family: var(--font-mono);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 0.05em 0.3em;
            font-size: 0.85em;
        }
        .slide pre {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 0.8em 1em;
            overflow: auto;
            font-size: 0.7em;
        }
        .slide pre code { background: none; border: none; padding: 0; }
        .slide blockquote {
            margin: 0.6em 0;
            padding: 0.5em 0.9em;
            background: var(--color-bg);
            border-left: 0.2em solid var(--color-highlight);
            border-radius: var(--radius);
        }
        .slide table { border-collapse: collapse; font-size: 0.85em; }
        .slide th, .slide td {
            text-align: left;
            padding: 0.3em 0.7em;
            border-bottom: 1px solid var(--color-border);
        }
        .slide th { background: var(--color-nav-bg); color: var(--color-nav-text); }

        /* Deck chrome: progress bar, counter, nav buttons. Quiet until hover. */
        .deck-progress {
            position: absolute;
            left: 0; bottom: 0;
            height: 4px; width: 100%;
            background: var(--color-border);
        }
        .deck-progress-bar {
            display: block; height: 100%; width: 0;
            background: var(--color-accent);
            transition: width 0.2s ease;
        }
        .deck-controls {
            position: absolute;
            right: 1rem; bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            opacity: 0.25;
            transition: opacity 0.2s ease;
        }
        .deck:hover .deck-controls { opacity: 1; }
        .deck-controls button {
            font: inherit;
            font-size: 1.1rem;
            line-height: 1;
            color: var(--color-nav-text);
            background: var(--color-nav-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 0.2em 0.5em;
            cursor: pointer;
        }
        .deck-controls button:hover { background: var(--color-accent); color: #fff; }
        .deck-counter {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            min-width: 3.2em;
            text-align: center;
        }

        /* --- iCalendar view --- */
        /* Full-bleed + full-height: a calendar wants all the space it can get
           (Teams-style). This element is also the calendar's own container
           (.axe-cal, a flex column), so flex:1 + min-height:0 bound it inside
           the flex-column content area — that gives the calendar's toolbar +
           scrolling body a definite height to divide. */
        .ical-wrap {
            flex: 1;
            min-height: 0;
            width: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        /* States */
        .state-message {
            text-align: center;
            color: var(--color-text-muted);
            padding: 4rem 2rem;
            font-size: 1rem;
        }

        .state-message code { font-size: 0.9em; }

        @media (max-width: 600px) {
            .toolbar { padding: 0.5rem 0.75rem; }
            .col-date { display: none; }
            .md-view { padding: 1.5rem 1rem; }
            .ical-wrap { padding: 1rem 0.75rem; }
        }
    </style>
    <script>
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    </script>
</head>
<body>

<div class="toolbar" id="toolbar" style="display:none">
    <span class="title" id="title"></span>
    <span class="info" id="info"></span>
    <button class="theme-toggle" aria-label="Toggle theme">&#9788;</button>
</div>

<main>
    <div id="content"><p class="state-message">Loading...</p></div>
</main>

<script>
(function() {

    // --- Theme toggle ---
    document.querySelector('.theme-toggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });

    // --- External-host allowlist (security) ---
    // The viewer renders fetched content as live HTML in this origin, so an
    // unrestricted ?url=https://… is a reflected-XSS vector: a crafted link
    // would run a third party's markup as us. External fetch is therefore
    // DENIED by default. To enable specific remote feeds, add their hostnames
    // here (exact host match, e.g. 'calendar.example.com'). Leave empty to
    // keep external fetch off entirely. Same-origin (relative) paths are
    // always allowed and are unaffected by this list.
    const EXTERNAL_ALLOWLIST = [];

    function isAllowedExternal(rawUrl) {
        let host;
        try { host = new URL(rawUrl).hostname; } catch (e) { return false; }
        return EXTERNAL_ALLOWLIST.includes(host);
    }

    // --- Source: embedded (baked) or fetched ---
    const params = new URLSearchParams(location.search);
    const embedEl = document.getElementById('axe-embed');
    // How to render a Markdown file: the parameter is the primary switch, the
    // analog of `pandoc -t pptx` vs `-t docx` — the target decides, not the
    // file. A baked file carries it as data-view; frontmatter is the fallback.
    const viewParam = ((embedEl && embedEl.getAttribute('data-view')) || params.get('view') || '').toLowerCase();

    // Shared by both source paths and read by the renderers, so they're
    // declared with `let`: the baked branch sets `name` and leaves `fetchUrl`
    // empty (renderIcal passes it as the calendar's sourceUrl — empty means a
    // local/inline feed with no Subscribe link, which is exactly right here).
    let name = '';
    let fetchUrl = '';

    const renderers = {
        csv: renderCsv,
        tsv: renderCsv,
        md: renderMarkdownEntry,
        markdown: renderMarkdownEntry,
        ics: renderIcal,
        ical: renderIcal
    };

    // Baked, server-free mode: `cleave` inlines the document into a hidden
    // <textarea id="axe-embed"> so the viewer renders over file:// with no
    // fetch (browsers block fetch() of local files). A textarea is RCDATA, so
    // the baked content is safe to read verbatim from .value. When the block
    // is present, render it and stop — the URL/fetch path below is never hit.
    if (embedEl) {
        const bakedExt = (embedEl.getAttribute('data-ext') || '').toLowerCase();
        name = embedEl.getAttribute('data-name') || ('document.' + bakedExt);
        document.title = name;
        if (renderers[bakedExt]) {
            renderers[bakedExt](embedEl.value, bakedExt);
        } else {
            showMessage('Embedded document type <code>' + escHtml(bakedExt) + '</code> is not supported.');
        }
        return;
    }

    // --- URL parameter ---
    const urlParam = params.get('url');

    if (!urlParam) {
        showMessage('No path specified. Use <code>?url=path/to/file</code>');
        return;
    }

    // External URL (http/https) or root-relative path
    const isExternal = /^https?:\/\//i.test(urlParam);

    if (isExternal && !isAllowedExternal(urlParam)) {
        showMessage('External URLs are not permitted by this viewer.');
        return;
    }
    fetchUrl = isExternal ? urlParam : '/' + urlParam.replace(/^\//, '').replace(/\/$/, '');
    const cleanPath = isExternal ? urlParam.replace(/^https?:\/\/[^/]+\/?/, '') : urlParam.replace(/^\//, '').replace(/\/$/, '');
    name = cleanPath.split('/').pop() || cleanPath;

    // --- Determine type by extension ---
    const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';

    if (renderers[ext]) {
        // It's a file we can render
        document.title = name + ' - View';
        fetch(fetchUrl)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
            .then(text => renderers[ext](text, ext))
            .catch(() => showMessage('Could not load <code>' + escHtml(fetchUrl) + '</code>'));
    } else if (!ext && isExternal) {
        // No extension but external: try as CSV (common for API endpoints)
        document.title = name + ' - View';
        fetch(fetchUrl)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
            .then(text => renderCsv(text, 'csv'))
            .catch(() => showMessage('Could not load <code>' + escHtml(fetchUrl) + '</code>'));
    } else if (ext) {
        // Unknown extension: let the browser handle it directly
        location.replace(fetchUrl);
    } else {
        // No extension, local: nothing to render. Directory browsing lives in
        // the separate `browse` tool now, not the viewer.
        showMessage('The viewer renders a single document. Point it at a <code>.csv</code>, <code>.md</code>, or <code>.ics</code> file.');
    }


    // ==========================================================
    // CSV Renderer
    // ==========================================================

    function renderCsv(text, ext) {
        const delim = ext === 'tsv' ? '\t' : ',';
        const rows = parseCsv(text, delim);
        if (rows.length < 2) {
            showMessage('File is empty or has no data rows.');
            return;
        }

        const headers = rows[0];
        const data = rows.slice(1);

        let sortCol = -1;
        let sortDir = 0;
        let groupCol = -1;
        let filters = new Array(headers.length).fill('');
        let collapsedGroups = new Set();

        // Toolbar
        const toolbar = document.getElementById('toolbar');
        toolbar.style.display = 'flex';
        document.getElementById('title').textContent = name;

        const sep1 = el('span', 'separator');
        const groupLabel = el('label');
        groupLabel.textContent = 'Group by:';
        const groupSelect = el('select');
        groupSelect.innerHTML = '<option value="-1">None</option>' +
            headers.map((h, i) => '<option value="' + i + '">' + escHtml(h) + '</option>').join('');
        groupSelect.addEventListener('change', () => {
            groupCol = parseInt(groupSelect.value);
            collapsedGroups.clear();
            render();
        });

        const sep2 = el('span', 'separator');
        const copyBtn = el('button');
        copyBtn.textContent = 'Copy filtered';
        copyBtn.addEventListener('click', copyFiltered);

        const sep3 = el('span', 'separator');
        const rowCount = el('span', 'info');

        // Insert before the theme toggle
        const toggle = toolbar.querySelector('.theme-toggle');
        toolbar.insertBefore(sep1, toggle);
        toolbar.insertBefore(groupLabel, toggle);
        toolbar.insertBefore(groupSelect, toggle);
        toolbar.insertBefore(sep2, toggle);
        toolbar.insertBefore(copyBtn, toggle);
        toolbar.insertBefore(sep3, toggle);
        toolbar.insertBefore(rowCount, toggle);

        const content = document.getElementById('content');
        content.innerHTML = '';
        content.className = 'csv-wrap';

        const table = document.createElement('table');
        table.className = 'csv-table';
        content.appendChild(table);

        render();

        function getFilteredData() {
            return data.filter(row => filters.every((f, i) => {
                if (!f) return true;
                return (row[i] || '').toLowerCase().includes(f.toLowerCase());
            }));
        }

        function render() {
            const filtered = getFilteredData();
            const digits = String(Math.max(filtered.length, 1)).length;
            table.style.setProperty('--row-num-width', 'calc(' + digits + 'ch + 1.25rem)');

            let sorted = filtered;
            if (sortCol >= 0 && sortDir > 0) {
                sorted = [...filtered].sort((a, b) => {
                    let va = a[sortCol] || '', vb = b[sortCol] || '';
                    const na = parseFloat(va.replace(/[,$%]/g, ''));
                    const nb = parseFloat(vb.replace(/[,$%]/g, ''));
                    if (!isNaN(na) && !isNaN(nb)) return sortDir === 1 ? na - nb : nb - na;
                    va = va.toLowerCase(); vb = vb.toLowerCase();
                    if (va < vb) return sortDir === 1 ? -1 : 1;
                    if (va > vb) return sortDir === 1 ? 1 : -1;
                    return 0;
                });
            }

            let html = '<thead><tr><th class="row-num">#</th>';
            headers.forEach((h, i) => {
                const arrow = sortCol === i
                    ? (sortDir === 1 ? '<span class="sort-arrow active">\u25b2</span>'
                        : sortDir === 2 ? '<span class="sort-arrow active">\u25bc</span>'
                        : '<span class="sort-arrow">\u25b2</span>')
                    : '<span class="sort-arrow">\u25b2</span>';
                html += '<th data-col="' + i + '">' + escHtml(h) + arrow + '</th>';
            });
            html += '</tr><tr class="filter-row"><th class="row-num"></th>';
            headers.forEach((h, i) => {
                html += '<th><input type="text" placeholder="Filter..." data-filter="' + i + '" value="' + escAttr(filters[i]) + '"></th>';
            });
            html += '</tr></thead><tbody>';

            let visibleCount = 0;
            if (groupCol >= 0) {
                const groups = new Map();
                sorted.forEach(row => {
                    const key = row[groupCol] || '(empty)';
                    if (!groups.has(key)) groups.set(key, []);
                    groups.get(key).push(row);
                });

                groups.forEach((rows, key) => {
                    const collapsed = collapsedGroups.has(key);
                    html += '<tr class="group-header' + (collapsed ? ' collapsed' : '') + '" data-group="' + escAttr(key) + '">';
                    html += '<td colspan="' + (headers.length + 1) + '"><span class="toggle">\u25bc</span>' + escHtml(key) + ' (' + rows.length + ')</td></tr>';
                    rows.forEach(row => {
                        visibleCount++;
                        html += '<tr class="' + (collapsed ? 'group-hidden' : '') + '" data-group-row="' + escAttr(key) + '">';
                        html += '<td class="row-num">' + visibleCount + '</td>';
                        row.forEach(cell => html += '<td title="' + escAttr(cell) + '">' + escHtml(cell) + '</td>');
                        html += '</tr>';
                    });
                });
            } else {
                sorted.forEach(row => {
                    visibleCount++;
                    html += '<tr><td class="row-num">' + visibleCount + '</td>';
                    row.forEach(cell => html += '<td title="' + escAttr(cell) + '">' + escHtml(cell) + '</td>');
                    html += '</tr>';
                });
            }

            html += '</tbody>';
            table.innerHTML = html;
            rowCount.textContent = visibleCount + ' of ' + data.length + ' rows';

            table.querySelectorAll('th[data-col]').forEach(th => {
                th.addEventListener('click', () => {
                    const col = parseInt(th.dataset.col);
                    if (sortCol === col) { sortDir = (sortDir + 1) % 3; if (sortDir === 0) sortCol = -1; }
                    else { sortCol = col; sortDir = 1; }
                    render();
                });
            });

            table.querySelectorAll('input[data-filter]').forEach(inp => {
                inp.addEventListener('input', () => {
                    filters[parseInt(inp.dataset.filter)] = inp.value;
                    render();
                    const newInp = table.querySelector('input[data-filter="' + inp.dataset.filter + '"]');
                    if (newInp) { newInp.focus(); newInp.selectionStart = newInp.selectionEnd = newInp.value.length; }
                });
            });

            table.querySelectorAll('.group-header').forEach(tr => {
                tr.addEventListener('click', () => {
                    const key = tr.dataset.group;
                    collapsedGroups.has(key) ? collapsedGroups.delete(key) : collapsedGroups.add(key);
                    render();
                });
            });
        }

        function copyFiltered() {
            const filtered = getFilteredData();
            let sorted = filtered;
            if (sortCol >= 0 && sortDir > 0) {
                sorted = [...filtered].sort((a, b) => {
                    let va = a[sortCol] || '', vb = b[sortCol] || '';
                    const na = parseFloat(va.replace(/[,$%]/g, ''));
                    const nb = parseFloat(vb.replace(/[,$%]/g, ''));
                    if (!isNaN(na) && !isNaN(nb)) return sortDir === 1 ? na - nb : nb - na;
                    va = va.toLowerCase(); vb = vb.toLowerCase();
                    if (va < vb) return sortDir === 1 ? -1 : 1;
                    if (va > vb) return sortDir === 1 ? 1 : -1;
                    return 0;
                });
            }
            const lines = [headers.join(',')];
            sorted.forEach(row => {
                lines.push(row.map(cell => {
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n'))
                        return '"' + cell.replace(/"/g, '""') + '"';
                    return cell;
                }).join(','));
            });
            navigator.clipboard.writeText(lines.join('\n')).then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = 'Copy filtered', 1500);
            });
        }
    }


    // ==========================================================
    // CSV Parser
    // ==========================================================

    function parseCsv(text, delim) {
        const rows = [];
        let row = [], cell = '', inQuotes = false, i = 0;

        while (i < text.length) {
            const ch = text[i];
            if (inQuotes) {
                if (ch === '"') {
                    if (text[i + 1] === '"') { cell += '"'; i += 2; }
                    else { inQuotes = false; i++; }
                } else { cell += ch; i++; }
            } else {
                if (ch === '"') { inQuotes = true; i++; }
                else if (ch === delim) { row.push(cell); cell = ''; i++; }
                else if (ch === '\r') { row.push(cell); cell = ''; rows.push(row); row = []; i++; if (text[i] === '\n') i++; }
                else if (ch === '\n') { row.push(cell); cell = ''; rows.push(row); row = []; i++; }
                else { cell += ch; i++; }
            }
        }
        if (cell || row.length > 0) { row.push(cell); rows.push(row); }

        const maxCols = Math.max(...rows.map(r => r.length));
        rows.forEach(r => { while (r.length < maxCols) r.push(''); });
        return rows;
    }


    // ==========================================================
    // Markdown Renderer
    // ==========================================================

    // Entry point for .md / .markdown. Splits frontmatter, decides whether to
    // render the file as a document or a slide deck, and dispatches. Both are
    // the same .md file; only the rendering differs (pandoc's model).
    function renderMarkdownEntry(text) {
        const { meta, body } = parseFrontmatter(text);
        const mode = resolveMode(meta);
        if (mode === 'slides') {
            renderSlides(body, meta);
        } else {
            renderMarkdownDoc(body);
        }
    }

    // A leading YAML metadata block, pandoc/Jekyll style: `---` on the first
    // line, terminated by `---` or `...`. We don't pull in a YAML parser —
    // just scalar `key: value` lines, which is all the routing and titling
    // need. Returns the stripped body so the frontmatter never renders as a
    // stray rule or table.
    function parseFrontmatter(text) {
        const m = /^---\r?\n([\s\S]*?)\r?\n(?:---|\.\.\.)[ \t]*\r?\n?/.exec(text);
        if (!m) return { meta: {}, body: text };
        const meta = {};
        m[1].split(/\r?\n/).forEach(function (line) {
            const kv = /^([A-Za-z0-9_-]+)[ \t]*:[ \t]*(.*)$/.exec(line);
            if (kv) meta[kv[1].toLowerCase()] = kv[2].trim().replace(/^["']|["']$/g, '');
        });
        return { meta: meta, body: text.slice(m[0].length) };
    }

    // The parameter wins (explicit override: ?view=slides / ?view=doc), then
    // frontmatter (`mode: slides` | `presentation` | `deck`), else document.
    function resolveMode(meta) {
        if (viewParam === 'slides' || viewParam === 'deck' || viewParam === 'presentation') return 'slides';
        if (viewParam === 'doc' || viewParam === 'document') return 'document';
        const m = (meta.mode || '').toLowerCase();
        if (m === 'slides' || m === 'presentation' || m === 'deck') return 'slides';
        return 'document';
    }

    function renderMarkdownDoc(body) {
        document.getElementById('toolbar').style.display = 'flex';
        document.getElementById('title').textContent = name;

        const content = document.getElementById('content');
        content.className = 'md-view';
        // marked does not sanitize; the document is untrusted, so scrub the
        // rendered HTML through DOMPurify before it touches the DOM. Without
        // this, a .md file's raw <img onerror=...> / <script> runs as our origin.
        content.innerHTML = DOMPurify.sanitize(marked.parse(body));
    }

    // Pandoc's slide division, so the same .md a deck renders from is the file
    // `pandoc -t pptx` exports: a horizontal rule (`---` on its own line,
    // blank-line surrounded) always forces a new slide, and a heading at the
    // slide level starts one too. Slide level defaults the way pandoc computes
    // it (the highest heading level followed immediately by content) and can be
    // pinned with a `slide-level:` frontmatter key. The presenter that renders
    // the resulting slides is native (no third-party engine).
    function renderSlides(body, meta) {
        const tokens = marked.lexer(body);
        const slideLevel = meta['slide-level']
            ? parseInt(meta['slide-level'], 10)
            : computeSlideLevel(tokens);

        const chunks = [];
        let current = '';
        tokens.forEach(function (tok) {
            if (tok.type === 'hr') {
                chunks.push(current);
                current = '';
                return; // the rule is the break; it isn't rendered
            }
            if (tok.type === 'heading' && tok.depth <= slideLevel && current.trim() !== '') {
                chunks.push(current);
                current = '';
            }
            current += tok.raw;
        });
        if (current.trim() !== '') chunks.push(current);

        const slides = chunks.filter(function (c) { return c.trim() !== ''; });

        // Full-bleed presenter: the toolbar gives way to the deck.
        document.getElementById('toolbar').style.display = 'none';
        document.title = (meta.title || name);

        const content = document.getElementById('content');
        content.className = '';
        let html = '<div class="deck"><div class="stage">';
        slides.forEach(function (chunk) {
            html += '<section class="slide">' + DOMPurify.sanitize(marked.parse(chunk)) + '</section>';
        });
        html += '</div>' +
            '<div class="deck-progress"><span class="deck-progress-bar"></span></div>' +
            '<div class="deck-controls">' +
                '<button class="deck-prev" title="Previous (←)">‹</button>' +
                '<span class="deck-counter"></span>' +
                '<button class="deck-next" title="Next (→)">›</button>' +
                '<button class="deck-full" title="Full screen (f)">⛶</button>' +
            '</div></div>';
        content.innerHTML = html;

        // --- Navigation ---
        const deck = content.querySelector('.deck');
        const slideEls = Array.prototype.slice.call(content.querySelectorAll('.slide'));
        const bar = content.querySelector('.deck-progress-bar');
        const counter = content.querySelector('.deck-counter');
        const last = slideEls.length - 1;
        let idx = -1;

        function clamp(n) { return n < 0 ? 0 : (n > last ? last : n); }

        function show(n) {
            n = clamp(n);
            if (n === idx) return;
            idx = n;
            slideEls.forEach(function (el, i) { el.classList.toggle('active', i === idx); });
            counter.textContent = (idx + 1) + ' / ' + slideEls.length;
            bar.style.width = ((idx) / (last || 1) * 100) + '%';
            const hash = '#' + (idx + 1);
            if (location.hash !== hash) location.replace(hash);
        }

        function next() { show(idx + 1); }
        function prev() { show(idx - 1); }

        // Start from the hash (deep links + reload land on the same slide).
        const fromHash = parseInt((location.hash || '').replace('#', ''), 10);
        show(isNaN(fromHash) ? 0 : fromHash - 1);

        document.addEventListener('keydown', function (e) {
            if (e.defaultPrevented) return;
            switch (e.key) {
                case 'ArrowRight': case 'PageDown': case ' ': next(); break;
                case 'ArrowLeft': case 'PageUp': prev(); break;
                case 'Home': show(0); break;
                case 'End': show(last); break;
                case 'f': case 'F':
                    if (!document.fullscreenElement) { if (deck.requestFullscreen) deck.requestFullscreen(); }
                    else if (document.exitFullscreen) document.exitFullscreen();
                    break;
                default: return;
            }
            e.preventDefault();
        });

        content.querySelector('.deck-next').addEventListener('click', next);
        content.querySelector('.deck-prev').addEventListener('click', prev);
        content.querySelector('.deck-full').addEventListener('click', function () {
            if (!document.fullscreenElement) { if (deck.requestFullscreen) deck.requestFullscreen(); }
            else if (document.exitFullscreen) document.exitFullscreen();
        });

        // Back/forward through slide hashes.
        window.addEventListener('hashchange', function () {
            const h = parseInt((location.hash || '').replace('#', ''), 10);
            if (!isNaN(h)) show(h - 1);
        });

        // Touch swipe.
        let touchX = null;
        deck.addEventListener('touchstart', function (e) { touchX = e.changedTouches[0].clientX; }, { passive: true });
        deck.addEventListener('touchend', function (e) {
            if (touchX === null) return;
            const dx = e.changedTouches[0].clientX - touchX;
            if (Math.abs(dx) > 40) { dx < 0 ? next() : prev(); }
            touchX = null;
        }, { passive: true });
    }

    function computeSlideLevel(tokens) {
        let level = null;
        for (let i = 0; i < tokens.length; i++) {
            if (tokens[i].type !== 'heading') continue;
            let j = i + 1;
            while (j < tokens.length && tokens[j].type === 'space') j++;
            const next = tokens[j];
            if (next && next.type !== 'heading') {
                if (level === null || tokens[i].depth < level) level = tokens[i].depth;
            }
        }
        return level || 1;
    }


    // ==========================================================
    // iCalendar Renderer
    // ==========================================================

    function renderIcal(text) {
        const toolbar = document.getElementById('toolbar');
        toolbar.style.display = 'flex';
        document.getElementById('title').textContent = name;

        // The calendar's list view scrolls inside its own body, which needs a
        // definite height to divide. The page's default body is min-height:100vh
        // (grows to fit content — fine for a scrolling document, but it never
        // bounds the calendar). Pin the body to the viewport for this view so the
        // flex chain (body → main → content → .ical-wrap → .cal-body) is bounded.
        document.body.style.height = '100vh';

        const content = document.getElementById('content');
        content.className = '';
        content.innerHTML = '';
        // Flex column so the calendar (.ical-wrap, flex:1) fills main's height.
        content.style.flex = '1';
        content.style.minHeight = '0';
        content.style.display = 'flex';
        content.style.flexDirection = 'column';
        const wrap = el('div', 'ical-wrap');
        content.appendChild(wrap);

        // Initial view: ?view= (or a baked data-view) picks day/week/month/list,
        // the calendar analog of the Markdown doc/slides switch — the same param,
        // its valid values keyed to the file type. Validate against the calendar's
        // own registry so this can't drift if a view is added; anything else
        // (including the Markdown values) falls back to month.
        const initialView = (Calendar.views && Calendar.views[viewParam]) ? viewParam : 'month';

        // The calendar owns its own toolbar now (view tabs, Today, navigation,
        // date picker). The viewer chrome above keeps the filename/calname title,
        // event count, and theme toggle — so the component's toggle is opted out.
        // sourceUrl tells the calendar where this feed lives (we fetched the text
        // ourselves) so it can offer a Subscribe link. Zone + Export + Subscribe
        // drop into the component's actions slot once its shell exists.
        const cal = new Calendar(wrap, {
            source: text, sourceUrl: fetchUrl, view: initialView, themeToggle: false
        });

        return cal.render().then(() => {
            const slot = cal.getToolbarSlot();
            const nodes = [];

            // Display timezone. Empty value = the browser's local zone.
            const tzLabel = el('label'); tzLabel.textContent = 'Zone:';
            const tzSelect = el('select');
            const localZone = (Intl.DateTimeFormat().resolvedOptions().timeZone) || 'local';
            const zones = ['UTC', 'America/New_York', 'America/Chicago', 'America/Denver',
                'America/Los_Angeles', 'America/Anchorage', 'Pacific/Honolulu',
                'Europe/London', 'Europe/Berlin', 'Asia/Tokyo', 'Australia/Sydney'];
            let tzOpts = '<option value="">Local (' + escHtml(localZone) + ')</option>';
            for (const z of zones) tzOpts += '<option value="' + escAttr(z) + '">' + escHtml(z) + '</option>';
            tzSelect.innerHTML = tzOpts;
            tzSelect.addEventListener('change', () => cal.setTimezone(tzSelect.value || null));
            nodes.push(tzLabel, tzSelect);

            // Exports (download the current event set).
            const csvBtn = el('button', 'cal-action ghost'); csvBtn.textContent = 'Export CSV';
            csvBtn.addEventListener('click', () => cal.export('csv'));
            const icalBtn = el('button', 'cal-action ghost'); icalBtn.textContent = 'Export iCal';
            icalBtn.addEventListener('click', () => cal.export('ical'));
            nodes.push(csvBtn, icalBtn);

            // Subscribe — only when the feed lives at a real http(s) URL (not a
            // local file:// or inline source), so there's a stable URL to subscribe to.
            const sub = cal.getSubscribeUrl();
            if (sub) {
                const subLink = el('button', 'cal-action ghost');
                subLink.textContent = 'Subscribe';
                subLink.title = 'Subscribe in your calendar app — ' + sub.url;
                subLink.addEventListener('click', () => { window.location.href = sub.webcal; });
                const copyBtn = el('button', 'cal-action ghost');
                copyBtn.textContent = 'Copy URL';
                copyBtn.title = 'Copy the feed URL (for Google Calendar)';
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(sub.url).then(() => {
                        copyBtn.textContent = 'Copied!';
                        setTimeout(() => copyBtn.textContent = 'Copy URL', 1500);
                    });
                });
                nodes.push(subLink, copyBtn);
            }

            if (slot) nodes.forEach(node => slot.appendChild(node));

            // Prefer the calendar's own name (X-WR-CALNAME) over the filename.
            if (cal.meta && cal.meta.calname) {
                document.getElementById('title').textContent = cal.meta.calname;
                document.title = cal.meta.calname + ' - View';
            }
        });
    }


    // ==========================================================
    // Utilities
    // ==========================================================

    function showMessage(html) {
        document.getElementById('content').innerHTML = '<p class="state-message">' + html + '</p>';
    }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function escAttr(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

    function el(tag, cls) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
    }

})();
</script>

</body>
</html>
